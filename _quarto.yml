project:
  type: website
  output-dir: _site
  resources:
    - assets/

website:
  title: "VERA"
  description: "VERA — Victoria Erofeeva Research on adaptive networked intelligence, distributed optimization, and multi-agent coordination."
  site-url: https://vera-research.dev
  page-navigation: true
  back-to-top-navigation: true
  repo-url: https://github.com/Ultramarine-x64/vera-research
  repo-actions: [issue]
  draft-mode: unlinked

  navbar:
    title: false
    logo: assets/vera_navbar_A_fit.svg
    logo-alt: "VERA"
    background: "#FAFAFA"
    foreground: "#09090B"
    left:
      - text: About
        href: about/index.qmd
      - text: Research
        href: research.qmd
      - text: Publications
        href: publications.qmd
      - text: Notes
        href: blog/index.qmd
    right:
      - text: CV
        href: assets/cv.pdf
      - icon: github
        href: https://github.com/Ultramarine-x64
        aria-label: GitHub

  page-footer:
    center: |
      **VERA** — Victoria Erofeeva Research · Adaptive Networked Intelligence  
      [Email](mailto:vicki.ultramarine@gmail.com) · [GitHub](https://github.com/Ultramarine-x64) · [LinkedIn](https://www.linkedin.com/in/vicki-erofeeva/)  
      © 2026 Victoria Erofeeva

format:
  html:
    theme:
      - cosmo
      - assets/vera-theme.scss
    toc: true
    toc-depth: 3
    smooth-scroll: true
    link-external-newwindow: true

bibliography: references.bib
csl: ieee.csl

citeproc: false

filters:
  - filters/vera-pubs.lua

execute:
  freeze: auto

lang: en
